name: Bump Homebrew Cask

on:
  release:
    types: [published]

jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - name: Update Homebrew
        run: brew update

      - name: Bump cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          brew bump-cask-pr \
            --version "$VERSION" \
            --no-browse \
            simple-dap-gui
